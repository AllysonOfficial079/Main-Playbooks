---
# Play 1: Identify all online hosts
- hosts: all
  ignore_unreachable: true
  gather_facts: false
  become: true
  tasks:
    - name: Check Connectivity
      ansible.builtin.wait_for_connection:
        timeout: 5
      register: conn_check
    - name: Group Reachable Hosts
      ansible.builtin.group_by:
        key: reachable_hosts
      when: conn_check is succeeded
      
# Play 2 Run All Tasks on reachable Hosts only
- hosts: reachable_hosts
  ignore_unreachable: true
  become: true
  tasks:
    - name: Execute on only online hosts
      ansible.builtin.debug:
        msg: "This host is online"  
    - name: Update apt cache and upgrade security packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
        dpkg_options: 'force-confold,force-confdef'
      register: apt_output

    - name: Display upgrade results
      ansible.builtin.debug:
        var: apt_output.stdout_lines

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot server if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible due to security updates"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
      when: reboot_required_file.stat.exists
